# M3 datastore: Postgres 16 with pgvector pre-installed.
# Credentials here are local-dev only and match DB_DSN in build_index.py.
# Start:  docker compose up -d
# Verify: docker compose exec postgres psql -U raguser -d ragdb -c "SELECT count(*) FROM chunks;"
# Stop:   docker compose down        (add -v to also wipe the data volume)

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rag_postgres
    environment:
      POSTGRES_USER: raguser
      POSTGRES_PASSWORD: ragpass
      POSTGRES_DB: ragdb
    ports:
      - "5432:5432"
    volumes:
      - ragdata:/var/lib/postgresql/data

  api:
    build: .
    container_name: rag_api
    depends_on:
      - postgres
    environment:
      # inside compose, reach Postgres by service name, not localhost
      DB_DSN: "host=postgres dbname=ragdb user=raguser password=ragpass port=5432"
    env_file:
      - .env            # brings in OPENAI_API_KEY and the rest
    ports:
      - "8000:8000"

volumes:
  ragdata:
